apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: flask-app
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  strategy: {}
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
      - image: 598497819406.dkr.ecr.ap-southeast-2.amazonaws.com/docker/flask-sample:1.0
        name: flask-sample
        resources: {}
        readinessProbe:
          httpGet: 
            path: / 
            port: 4567
          initialDelaySeconds: 5
          periodSeconds: 10

status: {}
